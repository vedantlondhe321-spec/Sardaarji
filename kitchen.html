<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SardaarJi Kitchen - Sound Alerts</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e31e24; }
        
        /* Audio Control Button */
        #mute-btn { 
            background: #444; color: white; border: none; padding: 10px 20px; 
            border-radius: 20px; cursor: pointer; font-weight: bold;
        }
        .sound-on { background: #27ae60 !important; }

        #kitchen-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 20px; }
        .order-card { background: #1a1a1a; border-radius: 12px; border-top: 8px solid #e31e24; padding: 15px; }
        .card-preparing { border-top-color: #f1c40f; }
        .btn-done { width: 100%; padding: 12px; margin-top: 10px; cursor: pointer; font-weight: bold; border-radius: 5px; border: none; }
    </style>
</head>
<body>

<div class="header">
    <h1>👨‍🍳 KITCHEN ALERTS</h1>
    <button id="mute-btn" onclick="toggleSound()">🔊 SOUND IS OFF</button>
</div>

<div id="kitchen-grid"></div>

<audio id="order-chime" preload="auto">
    <source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg">
</audio>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDgXIZhn1DrZdLvVA2ZQ3FT7pdvWagDJps",
        authDomain: "sardaarji-88f52.firebaseapp.com",
        projectId: "sardaarji-88f52",
        storageBucket: "sardaarji-88f52.firebasestorage.app",
        messagingSenderId: "922357484331",
        appId: "1:922357484331:web:d2dd86f8d512ca66f6536e",
        databaseURL: "https://sardaarji-88f52-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let isMuted = true;
    let knownOrderIds = [];

    function toggleSound() {
        isMuted = !isMuted;
        const btn = document.getElementById('mute-btn');
        btn.innerText = isMuted ? "🔊 SOUND IS OFF" : "🔔 SOUND IS ON";
        btn.classList.toggle('sound-on');
        
        // Play briefly to "unlock" audio in browser
        if(!isMuted) {
            const audio = document.getElementById('order-chime');
            audio.play().then(() => audio.pause()); 
        }
    }

    db.ref('orders').on('value', (snap) => {
        const orders = snap.val();
        const grid = document.getElementById('kitchen-grid');
        grid.innerHTML = "";
        
        if (!orders) return;

        let hasNewOrder = false;
        for (let id in orders) {
            // Check if this is a truly NEW order (not just an update)
            if (!knownOrderIds.includes(id) && orders[id].status === "New") {
                hasNewOrder = true;
                knownOrderIds.push(id);
            }

            if (orders[id].status === "Done") continue;

            const isPrep = orders[id].status === "Preparing";
            grid.innerHTML += `
                <div class="order-card ${isPrep ? 'card-preparing' : ''}">
                    <h3>TABLE ${orders[id].table}</h3>
                    <ul>${orders[id].items.map(i => `<li>${i.name}</li>`).join('')}</ul>
                    <button class="btn-done" onclick="updateStatus('${id}', '${isPrep ? 'Done' : 'Preparing'}')">
                        ${isPrep ? '✅ SERVED' : '👨‍🍳 START'}
                    </button>
                </div>
            `;
        }

        // Play sound if a new order was detected and sound is ON
        if (hasNewOrder && !isMuted) {
            document.getElementById('order-chime').play();
        }
    });

    function updateStatus(id, s) {
        db.ref('orders/' + id).update({ status: s });
    }
</script>
</body>
</html>
