<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SardaarJi Kitchen PRO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e31e24; padding-bottom: 10px; }
        
        #kitchen-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; margin-top: 20px; }
        
        .order-card { background: #1a1a1a; border-radius: 15px; overflow: hidden; border-top: 8px solid #444; position: relative; }
        .card-new { border-top-color: #e31e24; animation: pulse 2s infinite; }
        .card-preparing { border-top-color: #f1c40f; }
        
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(227, 30, 36, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(227, 30, 36, 0); } 100% { box-shadow: 0 0 0 0 rgba(227, 30, 36, 0); } }

        .card-header { padding: 15px; background: rgba(255,255,255,0.05); display: flex; justify-content: space-between; font-weight: bold; }
        .timer { color: #f1c40f; font-family: monospace; font-size: 18px; }
        
        .item-list { padding: 15px; list-style: none; margin: 0; }
        .item-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #333; font-size: 18px; }
        .item-note { color: #f1c40f; font-size: 13px; display: block; font-style: italic; }
        
        .btn-box { padding: 15px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-start { background: #f1c40f; color: #000; }
        .btn-done { background: #27ae60; color: #fff; }
    </style>
</head>
<body>

<div class="header">
    <h1>👨‍🍳 KITCHEN COMMAND</h1>
    <div id="connection">Connecting...</div>
</div>

<div id="kitchen-grid"></div>

<audio id="order-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDgXIZhn1DrZdLvVA2ZQ3FT7pdvWagDJps",
        authDomain: "sardaarji-88f52.firebaseapp.com",
        projectId: "sardaarji-88f52",
        storageBucket: "sardaarji-88f52.firebasestorage.app",
        messagingSenderId: "922357484331",
        appId: "1:922357484331:web:d2dd86f8d512ca66f6536e",
        databaseURL: "https://sardaarji-88f52-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Sound alert logic
    let lastOrderCount = 0;

    db.ref('orders').on('value', (snap) => {
        const orders = snap.val();
        const grid = document.getElementById('kitchen-grid');
        grid.innerHTML = "";
        
        if (!orders) return;

        const orderKeys = Object.keys(orders);
        if (orderKeys.length > lastOrderCount) {
            document.getElementById('order-sound').play().catch(() => {});
        }
        lastOrderCount = orderKeys.length;

        for (let id in orders) {
            const o = orders[id];
            if (o.status === "Done") continue;

            const cardClass = o.status === "Preparing" ? "card-preparing" : "card-new";
            
            grid.innerHTML += `
                <div class="order-card ${cardClass}">
                    <div class="card-header">
                        <span>TABLE ${o.table}</span>
                        <span class="timer" data-start="${o.timestamp || Date.now()}">00:00</span>
                    </div>
                    <ul class="item-list">
                        ${o.items.map(i => `
                            <li class="item-row">
                                <div>
                                    <strong>${i.name}</strong>
                                    <span class="item-note">${i.note}</span>
                                </div>
                            </li>
                        `).join('')}
                    </ul>
                    <div class="btn-box">
                        ${o.status !== "Preparing" ? 
                            `<button class="btn btn-start" onclick="updateStatus('${id}', 'Preparing')">START COOKING</button>` :
                            `<button class="btn btn-done" onclick="updateStatus('${id}', 'Done')">MARK AS SERVED</button>`
                        }
                    </div>
                </div>
            `;
        }
    });

    // Simple Live Timer Logic
    setInterval(() => {
        document.querySelectorAll('.timer').forEach(timer => {
            const start = parseInt(timer.dataset.start);
            const now = Date.now();
            const diff = Math.floor((now - start) / 1000);
            const mins = Math.floor(diff / 60).toString().padStart(2, '0');
            const secs = (diff % 60).toString().padStart(2, '0');
            timer.innerText = `${mins}:${secs}`;
            if (diff > 600) timer.style.color = "#e31e24"; // Red after 10 mins
        });
    }, 1000);

    function updateStatus(id, status) {
        db.ref('orders/' + id).update({ status: status });
    }

    db.ref('.info/connected').on('value', s => {
        document.getElementById('connection').innerText = s.val() ? "🟢 ONLINE" : "🔴 OFFLINE";
    });
</script>
</body>
</html>
