<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SardaarJi Kitchen App</title>
    
    <meta name="theme-color" content="#e31e24">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; margin: 0; padding: 20px; overflow-x: hidden; }
        
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding-bottom: 15px; border-bottom: 2px solid #e31e24; margin-bottom: 20px;
        }

        #mute-btn { 
            background: #444; color: white; border: none; padding: 12px 20px; 
            border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 14px;
        }
        .sound-on { background: #27ae60 !important; border: 2px solid white !important; }

        #kitchen-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 20px; 
        }

        .order-card { 
            background: #1a1a1a; border-radius: 15px; padding: 20px; 
            border-top: 10px solid #e31e24; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            position: relative;
        }
        .card-preparing { border-top-color: #f1c40f; }

        .item-list { list-style: none; padding: 0; margin: 15px 0; }
        .item-list li { padding: 8px 0; border-bottom: 1px solid #333; font-size: 18px; }
        .special-note { color: #f1c40f; font-size: 13px; font-weight: bold; display: block; margin-top: 4px; }

        .timer { font-size: 12px; color: #888; margin-top: 10px; }
        
        .btn-action { 
            width: 100%; padding: 15px; margin-top: 15px; cursor: pointer; 
            font-weight: 900; border-radius: 10px; border: none; font-size: 16px;
            text-transform: uppercase;
        }
        .btn-start { background: #f1c40f; color: #000; }
        .btn-done { background: #27ae60; color: #fff; }
    </style>
</head>
<body>

<div class="header">
    <div style="display:flex; align-items:center; gap:10px;">
        <span style="font-size:24px;">👨‍🍳</span>
        <h1 style="margin:0; font-size:20px;">LIVE KITCHEN</h1>
    </div>
    <button id="mute-btn" onclick="toggleSound()">🔇 ALERTS OFF</button>
</div>

<div id="kitchen-grid"></div>

<audio id="order-chime" preload="auto">
    <source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg">
</audio>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDgXIZhn1DrZdLvVA2ZQ3FT7pdvWagDJps",
        authDomain: "sardaarji-88f52.firebaseapp.com",
        projectId: "sardaarji-88f52",
        storageBucket: "sardaarji-88f52.firebasestorage.app",
        messagingSenderId: "922357484331",
        appId: "1:922357484331:web:d2dd86f8d512ca66f6536e",
        databaseURL: "https://sardaarji-88f52-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let isMuted = true;
    let seenOrders = new Set();

    function toggleSound() {
        isMuted = !isMuted;
        const btn = document.getElementById('mute-btn');
        btn.innerText = isMuted ? "🔇 ALERTS OFF" : "🔔 ALERTS ON";
        btn.classList.toggle('sound-on');
        if(!isMuted) {
            const audio = document.getElementById('order-chime');
            audio.play().then(() => audio.pause());
        }
    }

    db.ref('orders').on('value', (snap) => {
        const orders = snap.val();
        const grid = document.getElementById('kitchen-grid');
        grid.innerHTML = "";
        if (!orders) return;

        let playAlert = false;
        
        // Sort orders by time (Newest first)
        Object.keys(orders).reverse().forEach(id => {
            const order = orders[id];
            if (order.status === "Done") return;

            // Alert logic for truly new orders
            if (!seenOrders.has(id) && order.status === "New") {
                playAlert = true;
                seenOrders.add(id);
            }

            const isPrep = order.status === "Preparing";
            grid.innerHTML += `
                <div class="order-card ${isPrep ? 'card-preparing' : ''}">
                    <div style="display:flex; justify-content:space-between;">
                        <strong style="font-size:22px; color:#e31e24;">TABLE ${order.table}</strong>
                        <span class="timer">${order.time}</span>
                    </div>
                    <ul class="item-list">
                        ${order.items.map(i => `
                            <li>
                                ${i.name}
                                ${i.note !== "None" ? `<span class="special-note">⚠️ ${i.note}</span>` : ''}
                            </li>
                        `).join('')}
                    </ul>
                    <button class="btn-action ${isPrep ? 'btn-done' : 'btn-start'}" 
                            onclick="updateStatus('${id}', '${isPrep ? 'Done' : 'Preparing'}')">
                        ${isPrep ? '✅ MARK AS SERVED' : '🔥 START COOKING'}
                    </button>
                </div>
            `;
        });

        if (playAlert && !isMuted) {
            document.getElementById('order-chime').play();
        }
    });

    function updateStatus(id, s) {
        db.ref('orders/' + id).update({ status: s });
    }
</script>
</body>
</html>
