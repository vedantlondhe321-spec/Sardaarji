<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SardaarJi - Kitchen Dashboard</title>
    <!-- Corrected Firebase Scripts -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #111; color: #eee; padding: 20px; margin: 0; }
        h1 { border-bottom: 2px solid #e31e24; padding-bottom: 10px; color: #fff; display: flex; justify-content: space-between; align-items: center; }
        #kitchen-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .order-card { background: #222; border-left: 10px solid #e31e24; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .order-header { display: flex; justify-content: space-between; border-bottom: 1px solid #444; margin-bottom: 10px; padding-bottom: 5px; }
        .table-no { font-size: 24px; font-weight: bold; color: #e31e24; }
        .order-time { font-size: 14px; color: #888; }
        ul { list-style: none; padding: 0; margin: 15px 0; }
        li { margin-bottom: 10px; font-size: 18px; line-height: 1.4; }
        .item-note { display: block; font-size: 14px; color: #f1c40f; font-style: italic; }
        .total-row { font-size: 18px; font-weight: bold; text-align: right; border-top: 1px solid #444; padding-top: 10px; margin-top: 10px; color: #27ae60; }
        .btn-done { background: #27ae60; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; transition: 0.2s; }
        .btn-done:hover { background: #219150; }
        .btn-done:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <h1>
        <span>👨‍🍳 Active Kitchen Orders</span>
        <small style="font-size: 14px; color: #888;" id="connection-status">Connecting...</small>
    </h1>
    
    <div id="kitchen-list">Waiting for new orders...</div>

    <!-- Notification Sound -->
    <audio id="beep" src="https://mixkit.co"></audio>

    <script>
        // Corrected Firebase Config (Matches your index.html)
       const firebaseConfig = {
    apiKey: "AIzaSyDgXIZhn1DrZdLvVA2ZQ3FT7pdvWagDJps",
    authDomain: "sardaarji-88f52.firebaseapp.com",
    projectId: "sardaarji-88f52",
    storageBucket: "sardaarji-88f52.firebasestorage.app",
    messagingSenderId: "922357484331",
    appId: "1:922357484331:web:d2dd86f8d512ca66f6536e",
    // Fixed Database URL
    databaseURL: "https://sardaarji-88f52-default-rtdb.firebaseio.com" 
};
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const beep = document.getElementById('beep');

        // Monitor Connection
        database.ref('.info/connected').on('value', (snap) => {
            document.getElementById('connection-status').innerText = snap.val() ? "🟢 Online" : "🔴 Offline";
        });

        // Listen for new orders
        database.ref('orders').on('value', (snap) => {
            const orders = snap.val();
            const list = document.getElementById('kitchen-list');
            
            if (!orders) {
                list.innerHTML = "<div style='color:#666'>No active orders at the moment.</div>";
                return;
            }

            list.innerHTML = "";
            let newOrderCount = 0;

            for (let id in orders) {
                const o = orders[id];
                if(o.status === "Done") continue;
                
                newOrderCount++;
                let itemsList = o.items.map(i => `
                    <li>
                        <b>${i.name}</b>
                        <span class="item-note">Note: ${i.note}</span>
                    </li>
                `).join('');

                list.innerHTML += `
                    <div class="order-card">
                        <div class="order-header">
                            <span class="table-no">TABLE: ${o.table}</span>
                            <span class="order-time">${o.time}</span>
                        </div>
                        <ul>${itemsList}</ul>
                        <div class="total-row">Total Bill: ₹${o.total}</div>
                        <button class="btn-done" onclick="markDone('${id}')">✅ MARK AS SERVED</button>
                    </div>
                `;
            }

            if (newOrderCount === 0) {
                list.innerHTML = "<div style='color:#666'>All orders have been served.</div>";
            } else {
                // Play beep sound for new orders
                beep.play().catch(e => console.log("Sound blocked by browser until you click once."));
            }
        });

        function markDone(id) {
            database.ref('orders/' + id).update({ status: "Done" });
        }
    </script>
</body>
</html>
