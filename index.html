<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SardaarJi - Scan & Order</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --primary: #e31e24; --veg: #27ae60; --nonveg: #c0392b; --dark: #1a1a1a; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #fdfdfd; padding-bottom: 160px; color: #333; }
        .header { background: white; text-align: center; padding: 20px 15px; border-bottom: 5px solid var(--primary); sticky; top: 0; z-index: 100; }
        .table-tag { display: inline-block; background: #eee; padding: 5px 15px; border-radius: 20px; font-size: 13px; font-weight: bold; color: #666; }
        .section-title { background: #f8f8f8; padding: 12px 20px; font-weight: 800; color: var(--primary); text-transform: uppercase; border-left: 6px solid var(--primary); margin-top: 15px; font-size: 14px; }
        .item { background: white; padding: 18px 20px; border-bottom: 1px solid #f0f0f0; }
        .item-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .item-name { font-size: 16px; font-weight: 700; color: #222; }
        .item-price { font-size: 14px; color: #666; font-weight: bold; }
        .custom-note { width: 100%; margin-top: 12px; padding: 10px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 13px; box-sizing: border-box; background: #fafafa; }
        .add-btn { background: white; color: var(--primary); border: 2px solid var(--primary); padding: 8px 18px; border-radius: 6px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .add-btn:active { background: var(--primary); color: white; }
        #cart-panel { position: fixed; bottom: 0; width: 100%; background: var(--dark); color: white; padding: 20px; box-sizing: border-box; display: none; border-radius: 25px 25px 0 0; z-index: 1000; box-shadow: 0 -5px 20px rgba(0,0,0,0.3); }
        .order-btn { background: var(--veg); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: 800; margin-top: 10px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0; color:var(--primary);">SARDAARJI</h2>
    <div class="table-tag">TABLE <span id="table-id">...</span></div>
</div>

<div id="menu-container"></div>

<div id="cart-panel">
    <div id="cart-list" style="max-height: 150px; overflow-y: auto; margin-bottom: 10px;"></div>
    <div style="font-size: 18px; display: flex; justify-content: space-between; border-top: 1px solid #444; padding-top: 15px;">
        <strong>Total:</strong>
        <strong>₹<span id="total-price">0</span></strong>
    </div>
    <button class="order-btn" onclick="sendOrderToKitchen()">🚀 PLACE ORDER</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDgXIZhn1DrZdLvVA2ZQ3FT7pdvWagDJps",
        authDomain: "sardaarji-88f52.firebaseapp.com",
        projectId: "sardaarji-88f52",
        storageBucket: "sardaarji-88f52.firebasestorage.app",
        messagingSenderId: "922357484331",
        appId: "1:922357484331:web:d2dd86f8d512ca66f6536e",
        databaseURL: "https://sardaarji-88f52-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const menuData = [
        {
            category: "Veg Main Course (Gravy)",
            items: [
                { name: "Veg Keema Kasturi", price: 280 }, { name: "Dum Aloo Punjabi", price: 260 },
                { name: "Dal Tadka / Fry", price: 140 }, { name: "Dal Makhani", price: 195 },
                { name: "Paneer Tikka Masala", price: 300 }, { name: "Malai Kofta", price: 300 },
                { name: "Paneer Handi", price: 280 }, { name: "Veg Kolhapuri", price: 260 }
            ]
        },
        {
            category: "Non-Veg Main Course (Gravy)",
            items: [
                { name: "Butter Chicken (Boneless)", price: 320 }, { name: "Chicken Tikka Masala", price: 320 },
                { name: "Chicken Handi (Half)", price: 280 }, { name: "Mutton in Choice of Prep", price: 350 },
                { name: "Chicken Roghan Josh", price: 280 }, { name: "Egg Curry / Masala", price: 200 }
            ]
        },
        {
            category: "Biryani",
            items: [
                { name: "Veg Dum Biryani", price: 260 }, { name: "Paneer Tikka Biryani", price: 300 },
                { name: "Chicken Dum Biryani", price: 260 }, { name: "Butter Chicken Biryani", price: 320 },
                { name: "Mutton Biryani", price: 360 }
            ]
        },
        {
            category: "Rotis & Naan",
            items: [
                { name: "Tandoori Roti (Butter)", price: 30 }, { name: "Garlic Naan", price: 40 },
                { name: "Lachcha Paratha", price: 40 }, { name: "Butter Kulcha", price: 60 }
            ]
        }
    ];

    let cart = [];
    const table = new URLSearchParams(window.location.search).get('t') || "Self";
    document.getElementById('table-id').innerText = table;

    const menuContainer = document.getElementById('menu-container');
    menuData.forEach((sect, sIdx) => {
        let html = `<div class="section-title">${sect.category}</div>`;
        sect.items.forEach((item, iIdx) => {
            const id = `note-${sIdx}-${iIdx}`;
            html += `<div class="item">
                <div class="item-header">
                    <div><span class="item-name">${item.name}</span><br><span class="item-price">₹${item.price}</span></div>
                    <button class="add-btn" onclick="addToCart('${item.name}', ${item.price}, '${id}')">ADD +</button>
                </div>
                <input type="text" id="${id}" class="custom-note" placeholder="Instructions? (e.g. less spicy)">
            </div>`;
        });
        menuContainer.innerHTML += html;
    });

    function addToCart(name, price, inputId) {
        const note = document.getElementById(inputId).value || "Regular";
        cart.push({ name, price, note });
        document.getElementById(inputId).value = ""; 
        renderCart();
    }

    function renderCart() {
        const panel = document.getElementById('cart-panel');
        panel.style.display = cart.length > 0 ? 'block' : 'none';
        let total = 0;
        document.getElementById('cart-list').innerHTML = cart.map(i => {
            total += i.price;
            return `<div style="display:flex; justify-content:space-between; margin-bottom:5px; font-size:14px;">
                <span>${i.name}</span><span>₹${i.price}</span>
            </div>`;
        }).join('');
        document.getElementById('total-price').innerText = total;
    }

    function sendOrderToKitchen() {
        const orderData = { 
            table, items: cart, total: document.getElementById('total-price').innerText, 
            status: "New", time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) 
        };
        database.ref('orders').push(orderData).then(() => {
            alert("Order sent! 👨‍🍳");
            cart = [];
            renderCart();
        }).catch(err => alert("Error: " + err.message));
    }
</script>
</body>
</html>
